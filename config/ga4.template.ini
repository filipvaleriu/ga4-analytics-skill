# ============================================================
# TEMPLATE - Configurare Google Analytics 4 (GA4) Data API
# ============================================================
# UTILIZARE:
#   1. Copiaza acest fisier ca: config/ga4.ini
#   2. Completeaza valorile reale
#   3. config/ga4.ini e in .gitignore - NU face commit cu valori reale
#
# OBTINERE REFRESH TOKEN:
#   Ruleaza: python Analiza-Campanii/get_ga4_refresh_token.py
#   ATENTIE: GA4 necesita scope DIFERIT fata de Google Ads:
#     - Google Ads -> https://www.googleapis.com/auth/adwords
#     - GA4       -> https://www.googleapis.com/auth/analytics.readonly
#   NU refolosi refresh_token-ul din google_ads.ini - nu are scope-ul corect.
#
# PROPERTY ID:
#   Google Analytics > Admin > Property Settings > Property ID (numeric).
#   NU include prefixul "properties/".
# ============================================================

[ga4]
# OAuth 2.0 Desktop credentials (poate fi aceeasi app OAuth ca Google Ads)
client_id = YOUR_CLIENT_ID.apps.googleusercontent.com
client_secret = YOUR_CLIENT_SECRET

# Refresh token obtinut cu scope analytics.readonly
refresh_token = YOUR_REFRESH_TOKEN_ANALYTICS_SCOPE

# Property ID GA4 (numeric, fara prefix "properties/")
property_id = 0

# Versiunea API - GA4 Data API curenta este v1beta
api_version = v1beta
